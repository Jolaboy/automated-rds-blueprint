name: Database Migration Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FLYWAY_VERSION: '10'

    # Spin up a transient PostgreSQL instance inside the runner
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: runner_user
          POSTGRES_PASSWORD: runner_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Cache Flyway CLI
        uses: actions/cache@v4
        with:
          path: ~/.flyway
          key: ${{ runner.os }}-flyway-${{ env.FLYWAY_VERSION }}

      - name: Install Flyway CLI
        run: |
          mkdir -p $HOME/.flyway
          curl -sL "https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/${{ env.FLYWAY_VERSION }}/flyway-commandline-${{ env.FLYWAY_VERSION }}.tar.gz" \
            | tar xz -C $HOME/.flyway --strip-components=1
          export PATH="$HOME/.flyway:$PATH"
          flyway -v

      - name: Run Flyway Migration Validation
        env:
          FLYWAY_URL: jdbc:postgresql://postgres:5432/test_db
          FLYWAY_USER: runner_user
          FLYWAY_PASSWORD: runner_password
        run: |
          export PATH="$HOME/.flyway:$PATH"
          flyway -url="$FLYWAY_URL" -user="$FLYWAY_USER" -password="$FLYWAY_PASSWORD" -locations=filesystem:migrations -connectRetries=10 info
          flyway -url="$FLYWAY_URL" -user="$FLYWAY_USER" -password="$FLYWAY_PASSWORD" -locations=filesystem:migrations -connectRetries=10 migrate